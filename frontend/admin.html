<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Datainsight SST Suite - Administração</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      min-height:100vh;
      padding:30px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:30px;
      flex-wrap:wrap;
      gap:15px;
    }

    .logo{
      font-size:28px;
      font-weight:bold;
      color:#38bdf8;
    }

    .subtitle{
      color:#94a3b8;
      margin-top:5px;
    }

    .logout-btn{
      background:#dc2626;
      border:none;
      color:white;
      padding:12px 18px;
      border-radius:10px;
      cursor:pointer;
      font-weight:bold;
    }

    .container{
      display:grid;
      grid-template-columns:350px 1fr;
      gap:25px;
    }

    .card{
      background:#1e293b;
      border-radius:18px;
      padding:25px;
      box-shadow:0 0 20px rgba(0,0,0,0.3);
    }

    h2{
      margin-bottom:20px;
      color:#38bdf8;
    }

    .form-group{
      margin-bottom:18px;
    }

    label{
      display:block;
      margin-bottom:6px;
      color:#cbd5e1;
    }

    input, select{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#334155;
      color:white;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      background:#0ea5e9;
      color:white;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      opacity:0.9;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th, td{
      padding:12px;
      border-bottom:1px solid #334155;
      text-align:left;
    }

    th{
      color:#38bdf8;
    }

    .status-active{
      color:#22c55e;
      font-weight:bold;
    }

    .status-inactive{
      color:#ef4444;
      font-weight:bold;
    }

    .action-btn{
      padding:8px 12px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-weight:bold;
    }

    .btn-disable{
      background:#ef4444;
      color:white;
    }

    .btn-enable{
      background:#22c55e;
      color:white;
    }

    #msg{
      margin-top:15px;
      font-weight:bold;
    }

    @media(max-width:900px){
      .container{
        grid-template-columns:1fr;
      }

      table{
        font-size:14px;
      }
    }
  </style>
</head>

<body>

  <div class="topbar">
    <div>
      <div class="logo">Datainsight SST Suite</div>
      <div class="subtitle">Painel Administrativo</div>
    </div>

    <button class="logout-btn" onclick="logout()">
      Sair
    </button>
  </div>

  <div class="container">

    <!-- Cadastro -->
    <div class="card">

      <h2>Novo Usuário</h2>

      <div class="form-group">
        <label>Nome</label>
        <input type="text" id="name">
      </div>

      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="email">
      </div>

      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="password">
      </div>

      <div class="form-group">
        <label>Perfil</label>
        <select id="role">
          <option value="user">Usuário</option>
          <option value="gestor">Gestor</option>
          <option value="admin">Administrador</option>
        </select>
      </div>

      <div class="form-group">
        <label>Plano</label>
        <select id="plan">
          <option value="free">Free</option>
          <option value="pro">Pro</option>
          <option value="enterprise">Enterprise</option>
        </select>
      </div>

      <button onclick="createUser()">
        Criar Usuário
      </button>

      <div id="msg"></div>

    </div>

    <!-- Lista -->
    <div class="card">

      <h2>Usuários</h2>

      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th>E-mail</th>
            <th>Perfil</th>
            <th>Plano</th>
            <th>Status</th>
            <th>Ação</th>
          </tr>
        </thead>

        <tbody id="usersTable"></tbody>

      </table>

    </div>

  </div>

  <script src="admin.js"></script>

</body>
</html>
