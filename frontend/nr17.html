<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>DataInsight SST – NR-17 / Avaliação Ergonômica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="assets/branding.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>

  <style>

    .nr17-page {
      width: 100%;
      max-width: 1450px;
      margin: 0 auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      box-sizing: border-box;
    }

    .nr17-header-card {
      padding: 24px;
    }

    .nr17-header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
      margin-bottom: 12px;
    }

    .nr17-title-block h2 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
      color: #0f172a;
    }

    .nr17-title-block p {
      margin-top: 6px;
      color: #64748b;
      font-size: 14px;
    }

    .nr17-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 260px;
    }

    .nr17-actions .btn {
      width: 100%;
      justify-content: center;
    }

    .nr17-index-row {
      margin-top: 10px;
      font-size: 15px;
      color: #374151;
    }

    #resultadoRisco {
      font-size: 18px;
      color: #2563eb;
      font-weight: 700;
    }

    .nr17-main-grid {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .nr17-left-col {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .nr17-form-card,
    .nr17-table-card,
    .nr17-header-card {
      padding: 24px;
    }

    .nr17-form-card h3 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 22px;
      font-weight: 700;
      color: #0f172a;
    }

    .nr17-form-card p.section-subtitle {
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 13px;
      color: #64748b;
    }

    .nr17-form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
      align-items: start;
    }

    .nr17-form-grid label {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 13px;
      color: #374151;
      font-weight: 500;
    }

    .nr17-form-grid input,
    .nr17-form-grid select,
    .nr17-form-grid textarea {
      width: 100%;
      border-radius: 12px;
      border: 1px solid #dbe2ea;
      padding: 12px;
      font-size: 14px;
      background: #f8fafc;
      box-sizing: border-box;
      transition: 0.2s;
    }

    .nr17-form-grid input:focus,
    .nr17-form-grid select:focus,
    .nr17-form-grid textarea:focus {
      outline: none;
      border-color: #3b82f6;
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }

    .nr17-form-grid label.full-row {
      grid-column: 1 / -1;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    .card {
      border-radius: 22px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      border: 1px solid #e5e7eb;
      background: #ffffff;
    }

    .nr17-table-card h3 {
      margin-top: 0;
      margin-bottom: 14px;
      font-size: 20px;
      color: #0f172a;
    }

    .nr17-filter-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 14px;
    }

    .nr17-filter-row input {
      width: 100%;
      max-width: 420px;
      border-radius: 12px;
      border: 1px solid #dbe2ea;
      padding: 10px 12px;
      background: #f8fafc;
    }

    .nr17-table-wrapper {
      border-radius: 14px;
      overflow: auto;
      max-height: 320px;
    }

    .table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .table thead {
      background: #f1f5f9;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    .table th {
      padding: 12px;
      font-size: 13px;
      font-weight: 700;
      color: #0f172a;
      text-align: left;
    }

    .table td {
      padding: 10px 12px;
      border-bottom: 1px solid #e5e7eb;
      color: #475569;
    }

    .table tr:hover {
      background: #f8fafc;
    }

    .actions-cell {
      display: flex;
      justify-content: center;
      gap: 6px;
    }

    .icon-btn {
      border: none;
      background: #dbeafe;
      border-radius: 8px;
      padding: 6px 8px;
      cursor: pointer;
      transition: 0.2s;
      font-size: 13px;
    }

    .icon-btn:hover {
      transform: translateY(-1px);
      background: #bfdbfe;
    }

    .icon-btn.delete {
      background: #fee2e2;
    }

    .icon-btn.delete:hover {
      background: #fecaca;
    }

    @media (max-width: 900px) {

      .nr17-page {
        padding: 14px;
      }

      .nr17-header-top {
        flex-direction: column;
      }

      .nr17-actions {
        width: 100%;
      }

      .nr17-form-grid {
        grid-template-columns: 1fr;
      }

      .table {
        min-width: 850px;
      }

    }

  </style>

  <script src="nr17.js" defer></script>

</head>

        <div class="nr17-title-block">
          <h2>NR-17 — Avaliação Ergonômica de Posto de Trabalho</h2>
          <p>
            Registre as condições ergonômicas do posto e obtenha uma classificação simples de risco.

        </div>

        <div class="nr17-actions">
          <button class="btn primary" onclick="salvarNR17()">💾 Salvar Avaliação</button>
          <button class="btn secondary" onclick="limparNR17()">🧹 Limpar</button>
          <button class="btn secondary" onclick="imprimirUltimaNR17()">🖨️ Imprimir última avaliação</button>
          <button class="btn secondary" onclick="exportarPDFUltimaNR17()">📄 Exportar PDF (última)</button>
        </div>

      </div>

      <div class="nr17-index-row">
        Índice global de risco:

    </section>

</body>
</html>
